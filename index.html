<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador Profissional de Ciclos</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --danger: #ff4d4d;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 95%; max-width: 1000px; padding: 20px; }

        /* Dashboard Header */
        .header { 
            width: 100%; padding: 20px; background: var(--card); 
            border-bottom: 2px solid var(--primary); text-align: center;
        }

        .date-badge { 
            background: var(--primary); color: #000; padding: 5px 15px; 
            border-radius: 20px; font-weight: bold; font-size: 0.9rem;
        }

        /* Input Area */
        .input-section {
            background: var(--card); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border); margin: 20px 0;
        }

        textarea {
            width: 100%; height: 100px; background: #010409; color: var(--primary);
            border: 1px solid var(--border); border-radius: 8px; padding: 10px;
            font-family: monospace; resize: none; box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { 
            flex: 1; padding: 12px; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-save { background: var(--primary); color: #000; }
        .btn-clear { background: var(--danger); color: #fff; }

        /* Grid de Boxes */
        .grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; margin-top: 20px;
        }

        .box {
            background: var(--card); padding: 15px; border-radius: 10px;
            border: 1px solid var(--border); text-align: center;
        }
        .box h3 { font-size: 0.8rem; color: #8b949e; margin: 0 0 10px 0; text-transform: uppercase; }
        .box .val { font-size: 1.4rem; font-weight: bold; color: var(--primary); }

        /* Sugestões de Ciclo */
        .prediction-card {
            background: linear-gradient(145deg, #161b22, #0d1117);
            padding: 25px; border-radius: 15px; border: 2px solid var(--primary);
            margin-top: 30px; text-align: center;
        }
        .prediction-card h2 { margin-top: 0; color: var(--primary); }
        .possibilidades { font-size: 1.8rem; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <h1>DATA ANALYSIS SYSTEM</h1>
    <span id="dataAtual" class="date-badge">--/--/----</span>
</div>

<div class="container">
    <div class="input-section">
        <h3>📥 Importar Dados</h3>
        <textarea id="rawInput" placeholder="Cole aqui os resultados (ex: milhares, centenas, dezenas...)"></textarea>
        <div class="btn-group">
            <button class="btn-save" onclick="processarDados()">GRAVAR NO BANCO</button>
            <button class="btn-clear" onclick="limparBanco()">LIMPAR TUDO</button>
        </div>
    </div>

    <div class="grid">
        <div class="box"><h3>Milhares</h3><div id="mCount" class="val">0</div></div>
        <div class="box"><h3>Centenas</h3><div id="cCount" class="val">0</div></div>
        <div class="box"><h3>Dezenas</h3><div id="dCount" class="val">0</div></div>
        <div class="box"><h3>Grupos</h3><div id="gCount" class="val">0</div></div>
    </div>

    <div class="prediction-card">
        <h2>🎯 PRÓXIMAS 5 POSSIBILIDADES</h2>
        <p>(Baseado no atraso dos 25 grupos)</p>
        <div id="predictBox" class="possibilidades">---</div>
    </div>
</div>

<script>
    // Inicialização do Banco de Dados
    let db = JSON.parse(localStorage.getItem('app_loto_db')) || {
        milhares: [], centenas: [], dezenas: [], grupos: []
    };

    function atualizarInterface() {
        document.getElementById('dataAtual').innerText = new Date().toLocaleDateString('pt-BR');
        document.getElementById('mCount').innerText = db.milhares.length;
        document.getElementById('cCount').innerText = db.centenas.length;
        document.getElementById('dCount').innerText = db.dezenas.length;
        document.getElementById('gCount').innerText = db.grupos.length;
        calcularCiclo();
    }

    function processarDados() {
        const texto = document.getElementById('rawInput').value;
        const numeros = texto.match(/\d+/g);

        if (!numeros) {
            alert("Nenhum número encontrado!");
            return;
        }

        numeros.forEach(num => {
            if (num.length >= 2) {
                const dezena = num.slice(-2);
                const centena = num.length >= 3 ? num.slice(-3) : "";
                const milhar = num.length >= 4 ? num.slice(-4) : "";
                const grupo = Math.ceil(parseInt(dezena === "00" ? 100 : dezena) / 4);

                db.dezenas.push(dezena);
                if (centena) db.centenas.push(centena);
                if (milhar) db.milhares.push(milhar);
                db.grupos.push(grupo);
            }
        });

        localStorage.setItem('app_loto_db', JSON.stringify(db));
        document.getElementById('rawInput').value = "";
        atualizarInterface();
    }

    function calcularCiclo() {
        if (db.grupos.length === 0) return;

        let contagem = {};
        for (let i = 1; i <= 25; i++) contagem[i] = 0;
        db.grupos.forEach(g => contagem[g]++);

        // Encontrar os 5 grupos com menor frequência (mais atrasados)
        let atrasados = Object.keys(contagem).sort((a, b) => contagem[a] - contagem[b]);
        document.getElementById('predictBox').innerText = atrasados.slice(0, 5).join(" - ");
    }

    function limparBanco() {
        if (confirm("Tem certeza que deseja apagar TODOS os dados permanentemente?")) {
            db = { milhares: [], centenas: [], dezenas: [], grupos: [] };
            localStorage.setItem('app_loto_db', JSON.stringify(db));
            atualizarInterface();
        }
    }

    atualizarInterface();
</script>

</body>
</html>
