<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.I - Inteligência & Histórico</title>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #16213e; --text: #c9d1d9; --accent: #58a6ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid var(--primary); margin-bottom: 15px; }
        
        textarea { width: 100%; height: 70px; background: #010409; color: var(--primary); border: 1px solid #30363d; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 16px; }
        
        .btn-group { display: flex; gap: 10px; margin: 10px 0; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-clear { background: #ff4d4d; color: #fff; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: var(--card); padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #30363d; }
        .stat-box small { color: #8b949e; display: block; font-size: 0.6rem; text-transform: uppercase; }
        .stat-box span { font-size: 1rem; font-weight: bold; color: var(--primary); }

        .prediction-panel { background: rgba(22, 33, 62, 0.8); padding: 15px; border-radius: 12px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .prediction-panel h2 { color: var(--accent); margin-top: 0; font-size: 1.1rem; text-align: center; text-transform: uppercase; }
        
        .bet-item { background: #0d1117; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid var(--accent); }
        .bet-label { font-size: 0.75rem; color: var(--accent); font-weight: bold; }
        .bet-value { font-size: 1.1rem; font-weight: bold; display: block; margin-top: 3px; color: #fff; }

        /* Estilo da Tabela de Histórico */
        .history-section { background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid #30363d; }
        .history-section h3 { font-size: 1rem; margin-top: 0; color: #8b949e; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { border-bottom: 2px solid #30363d; padding: 8px; text-align: left; color: var(--primary); }
        td { padding: 8px; border-bottom: 1px solid #30363d; }
        .tag-grupo { background: #238636; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>

    <h1 style="margin:0; font-size: 1.5rem;">S.A.I v2.1</h1>
    <div id="dataDisplay" style="font-size: 0.8rem; color: var(--primary); margin-top: 5px;"></div>
</div>
